seed: 42
device: auto            # auto | cuda | cpu

data:
  raw_path: data/raw/LSWMD.pkl
  processed_dir: data/processed/wm811k
  image_size: 64
  min_pixels: 100       # drop tiny wafers (too little signal)

split:
  test_size: 0.15
  val_size: 0.15
  group_col: lotName    # lot-group split — no leakage

labels:
  # WM-811K failureType values
  classes:
    - none
    - Center
    - Donut
    - Edge-Loc
    - Edge-Ring
    - Loc
    - Near-full
    - Random
    - Scratch

train:
  epochs: 30
  batch_size: 128
  num_workers: 4
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  early_stop_patience: 5

loss:
  type: focal              # focal | ce
  gamma: 2.0
  class_weight: balanced   # balanced | none | list of floats
  weight_mode: sqrt_inverse  # inverse | sqrt_inverse — sqrt avoids over-correction

model:
  arch: resnet18        # resnet18 | resnet34
  in_channels: 1
  pretrained: false

output:
  ckpt_dir: models/classification
  report_dir: reports/classification
